# 腾讯云 CloudBuild 云原生构建配置
# Cloud Native Buildpacks 构建配置

# API版本
apiVersion: v1

# 应用名称
app:
  name: mock-server
  version: 1.0.0
  description: "API接口模拟服务器 - Mock Server"

# 构建配置
build:
  # 构建环境
  environment:
    type: container
    
  # 构建触发器
  triggers:
    - name: main-branch
      branch: main
      action: auto-build-and-deploy
      
    - name: pr-build
      type: pull-request
      action: build-only

  # 构建步骤
  steps:
    # 步骤1：构建后端
    - name: build-backend
      type: maven-build
      workingDir: backend
      commands:
        - mvn clean package -DskipTests -Dmaven.test.skip=true
      artifacts:
        - backend/target/mock-server-*.jar
      cache:
        paths:
          - ~/.m2/repository
      
    # 步骤2：构建前端
    - name: build-frontend
      type: node-build
      workingDir: frontend
      commands:
        - npm install --registry=https://registry.npmmirror.com
        - npm run build
      artifacts:
        - frontend/dist/**/**
      cache:
        paths:
          - frontend/node_modules
      
    # 步骤3：构建Docker镜像
    - name: build-docker
      type: docker-build
      dockerfile: docker/Dockerfile
      context: .
      tags:
        - mock-server:latest
        - mock-server:${BUILD_ID}
      push: true
      registry:
        type: tencent-cloud
        region: ${REGION}
        namespace: ${NAMESPACE}
        repository: mock-server

# 部署配置
deploy:
  # 部署策略
  strategy:
    type: rolling-update
    maxSurge: 1
    maxUnavailable: 0
  
  # 部署环境
  environments:
    # 开发环境
    - name: dev
      branch: develop
      autoDeploy: false
      resources:
        cpu: 500m
        memory: 512Mi
      replicas: 1
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: dev
        - name: LOG_LEVEL
          value: DEBUG
    
    # 测试环境
    - name: test
      branch: release/*
      autoDeploy: true
      resources:
        cpu: 1000m
        memory: 1024Mi
      replicas: 2
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: test
    
    # 生产环境
    - name: prod
      branch: main
      autoDeploy: false
      requireApproval: true
      resources:
        cpu: 2000m
        memory: 2048Mi
      replicas: 3
      autoscaling:
        enabled: true
        minReplicas: 3
        maxReplicas: 10
        targetCPUUtilization: 70
        targetMemoryUtilization: 80
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: cloud
        - name: JAVA_OPTS
          value: -Xmx1g -Xms512m -XX:+UseG1GC

# 服务配置
service:
  name: mock-server-api
  type: web
  port: 8080
  targetPort: 8080
  
  # 健康检查
  healthCheck:
    enabled: true
    path: /api/v3/api-docs
    initialDelay: 60
    period: 30
    timeout: 10
    failureThreshold: 3
  
  # 就绪检查
  readinessCheck:
    enabled: true
    path: /api/v3/api-docs
    initialDelay: 30
    period: 10
    timeout: 5
    failureThreshold: 3

# 路由配置
routes:
  # API路由
  - path: /api
    service: mock-server-api
    rewrite: false
  
  # WebSocket路由
  - path: /ws
    service: mock-server-api
    websocket: true
  
  # 前端静态资源（如果前端也部署在同一服务）
  - path: /
    service: mock-server-api
    static:
      path: /app/public
      index: index.html

# 数据库配置（可选）
# 如果使用云开发MySQL，取消注释并配置
database:
  # CloudBase内置MySQL
  - type: mysql
    name: mock-server-db
    config:
      # 实例ID（需要提前创建）
      instanceId: ${MYSQL_INSTANCE_ID}
      # 数据库名
      database: mock_server
      # 用户名
      username: ${DB_USER}
      # 密码
      password: ${DB_PASSWORD}
      # 连接参数
      parameters:
        - name: useSSL
          value: false
        - name: serverTimezone
          value: Asia/Shanghai
        - name: characterEncoding
          value: utf8mb4

# 存储配置
storage:
  # 文件存储（用于日志、上传文件等）
  - name: mock-server-storage
    type: cloud
    config:
      # 存储桶名称
      bucket: ${STORAGE_BUCKET}
      # 存储路径
      path: /mock-server/
      # 生命周期
      lifecycle:
        - prefix: logs/
          expirationDays: 30
        - prefix: temp/
          expirationDays: 7

# 配置中心
config:
  # Nacos配置（如果使用Nacos）
  nacos:
    enabled: false
    serverAddr: ${NACOS_SERVER}
    namespace: ${NACOS_NAMESPACE}
    group: DEFAULT_GROUP
    dataId: mock-server

# 监控告警
monitoring:
  # 应用性能监控
  apm:
    enabled: true
    sampler:
      probability: 1.0
  
  # 日志收集
  logging:
    enabled: true
    level: INFO
    output: stdout
  
  # 告警规则
  alerting:
    enabled: true
    rules:
      # CPU告警
      - name: high-cpu-alert
        expression: avg(cpu_usage) > 80
        duration: 5m
        severity: warning
        notification:
          - type: email
            to: ${ALERT_EMAIL}
      
      # 内存告警
      - name: high-memory-alert
        expression: avg(memory_usage) > 85
        duration: 5m
        severity: warning
        notification:
          - type: email
            to: ${ALERT_EMAIL}
      
      # 错误率告警
      - name: high-error-rate
        expression: rate(http_requests_total{status=~"5.."}[5m]) > 5
        duration: 3m
        severity: critical
        notification:
          - type: email
            to: ${ALERT_EMAIL}
      
      # 磁盘告警
      - name: high-disk-usage
        expression: disk_usage > 80
        duration: 10m
        severity: warning
        notification:
          - type: email
            to: ${ALERT_EMAIL}

# 环境变量配置（生产环境敏感信息）
env:
  # JWT配置
  - name: JWT_SECRET
    value: ${JWT_SECRET}  # 从SecretManager获取
    sensitive: true
  
  # 管理员配置
  - name: ADMIN_USERNAME
    value: admin
  
  - name: ADMIN_PASSWORD
    value: ${ADMIN_PASSWORD}  # 从SecretManager获取
    sensitive: true
  
  # 数据库配置
  - name: MYSQL_HOST
    value: ${MYSQL_HOST}
  
  - name: MYSQL_PORT
    value: "3306"
  
  - name: MYSQL_DATABASE
    value: mock_server
  
  - name: MYSQL_USERNAME
    value: ${DB_USER}
  
  - name: MYSQL_PASSWORD
    value: ${DB_PASSWORD}  # 从SecretManager获取
    sensitive: true
  
  # 其他配置
  - name: SPRING_PROFILES_ACTIVE
    value: cloud
  
  - name: JAVA_OPTS
    value: -Xmx1g -Xms512m -XX:+UseG1GC -Dfile.encoding=UTF-8
  
  - name: TZ
    value: Asia/Shanghai

# CI/CD流水线配置
cicd:
  # 代码扫描
  codeScan:
    enabled: true
    tools:
      - sonarqube
      - checkstyle
  
  # 单元测试
  test:
    enabled: true
    coverage:
      min: 80
  
  # 安全扫描
  securityScan:
    enabled: true
    tools:
      - trivy
      - sonarqube
  
  # 镜像扫描
  imageScan:
    enabled: true
    severity:
      - HIGH
      - CRITICAL

# 网络配置
network:
  # 是否启用VPC
  vpc:
    enabled: false
    id: ${VPC_ID}
    subnetId: ${SUBNET_ID}
  
  # 安全组
  securityGroup:
    rules:
      - protocol: TCP
        port: 8080
        source: 0.0.0.0/0
        description: "HTTP API Port"
      - protocol: TCP
        port: 443
        source: 0.0.0.0/0
        description: "HTTPS Port"

# 成本优化
costOptimization:
  # 预留实例
  reservedInstances:
    enabled: false
    term: 1year
  
  # 自动启停（开发环境）
  autoStop:
    enabled: false
    schedule: "0 22 * * *"  # 每天22:00停止
    startSchedule: "0 8 * * *"  # 每天8:00启动
