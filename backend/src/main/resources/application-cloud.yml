# 腾讯云云原生环境配置
# CloudBase Cloud Native Environment

server:
  port: 8080
  servlet:
    context-path: /api
  # 云原生环境下使用默认端口
  forward-headers-strategy: framework

spring:
  application:
    name: mock-server
  
  # 云数据库配置
  datasource:
    # 使用腾讯云 MySQL（推荐生产环境）
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mock_server}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  # 缓存配置（使用Redis，如果可用）
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m
  
  # Redis 配置（可选）
  # 如果使用腾讯云Redis，取消注释并配置
  # redis:
  #   host: ${REDIS_HOST:localhost}
  #   port: ${REDIS_PORT:6379}
  #   password: ${REDIS_PASSWORD:}
  #   database: 0
  #   timeout: 5000ms
  #   lettuce:
  #     pool:
  #       max-active: 8
  #       max-idle: 8
  #       min-idle: 0
  #       max-wait: -1ms
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:mock-server-secret-key-2024-carolcoral-mock-server-application}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时
  # 令牌前缀
  token-prefix: Bearer

# Swagger 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    enabled: true
  
  # 生产环境可以禁用Swagger
  # enabled: ${SWAGGER_ENABLED:true}

# Mock Server 配置
mock:
  server:
    default-response-delay: 0
    enable-request-log: ${ENABLE_REQUEST_LOG:true}
    max-log-size: 10000

# 日志配置
logging:
  level:
    com.carolcoral.mockserver: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  file:
    name: /app/logs/mock-server.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB
  
  # 云环境日志输出到控制台
  config: classpath:logback-cloud.xml

# 管理员配置（从环境变量读取）
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:Admin@123}
  email: ${ADMIN_EMAIL:admin@mockserver.com}

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  
  # 健康检查
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

# 安全加固（生产环境建议）
security:
  # 启用HTTPS
  require-ssl: false
  
  # CORS配置
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:*}"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# 性能优化配置
server:
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    connection-timeout: 20000
    max-connections: 8192
  
  # HTTP2支持
  http2:
    enabled: true

# 异步配置
async:
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 1000
    keep-alive-seconds: 60
    thread-name-prefix: mock-server-async-

# 限流配置（防止滥用）
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:false}
  # 每个IP每分钟最多请求次数
  requests-per-minute: 1000
  
# IP白名单（可选）
ip-whitelist:
  enabled: ${IP_WHITELIST_ENABLED:false}
  # 多个IP用逗号分隔
  allowed-ips: ${ALLOWED_IPS:}

# WebSocket配置
websocket:
  # 最大会话数
  max-sessions: 10000
  # 每会话最大消息大小
  max-message-size: 10MB
  # 心跳间隔
  heartbeat-interval: 30000

# 云环境特定配置
cloud:
  # 腾讯云CAM角色（如果使用了）
  cam-role: ${CAM_ROLE:}
  
  # CLS日志服务
  cls:
    enabled: ${CLS_ENABLED:false}
    topic-id: ${CLS_TOPIC_ID:}
    region: ${CLS_REGION:ap-guangzhou}
  
  # 对象存储COS
  cos:
    enabled: ${COS_ENABLED:false}
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:ap-guangzhou}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}

# 自定义配置
app:
  name: Mock Server
  version: 1.0.0
  author: carolcoral
  github: https://github.com/carolcoral
