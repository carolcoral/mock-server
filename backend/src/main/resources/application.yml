server:
  port: ${SERVER_PORT:8080}

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      enabled: true
      show-details: when-authorized
  health:
    defaults:
      enabled: true

spring:
  profiles:
    active: ${DB_TYPE:sqlite}  # 通过环境变量切换数据库：sqlite | mysql | postgresql
  application:
    name: mock-server
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m

# Swagger配置（已关闭，流式SSE端点已加@Hidden注解避免类型扫描报错）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# JWT配置（HS512算法需要至少512位=64字节的密钥）
jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-512-bits-long-for-production-use-carolcoral-2024-mock-server}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时（毫秒），可通过环境变量配置

# Mock Server配置
mock:
  server:
    default-response-delay: 0 # 默认响应延迟（毫秒）
    enable-request-log: true # 是否记录请求日志

# 日志配置
logging:
  level:
    com.carolcoral.mockserver: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:./logs/mock-server.log}

# 管理账号配置（首次启动时创建）
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:Admin@123!}  # 默认密码，生产环境建议通过环境变量设置
  email: ${ADMIN_EMAIL:admin@mockserver.com}
