# ========================================
# 云原生开发环境配置
# ========================================
# 使用 CNB 官方云原生开发环境基础镜像 cnbcool/default-dev-env
# 该镜像已包含 JDK、Maven、Node.js 等完整开发工具链
# 代码通过 git clone 自动挂载到 /workspace
# .codebuddy、session、终端历史等通过 volumes 持久化挂载
# 服务本身不需要构建镜像，直接在开发环境中运行
# ========================================
$:
  vscode:
    - docker:
        # CNB 云原生开发环境基础镜像（内置 JDK、Maven、Node.js 等）
        image: cnbcool/default-dev-env
      services:
        - vscode
        - docker
      # 持久化挂载卷：保存 CodeBuddy 数据、session、终端历史等
      # 关闭开发环境后数据不丢失，下次打开自动恢复
      volumes:
        # CodeBuddy AI 助手数据（skills、plugins、对话历史、记忆等）
        - /root/.codebuddy
        # VS Code Server 数据（extensions、settings、state 等）
        - /root/.vscode-server
        # Shell 历史记录
        - /root/.bash_history
        # Maven 本地仓库缓存（加速后续构建）
        - /root/.m2
        # npm 缓存（加速前端依赖安装）
        - /root/.npm
      # 环境变量
      env:
        TZ: Asia/Shanghai
        LANG: C.UTF-8
      # 端口映射（开发调试用）
      ports:
        - 8080  # Spring Boot 后端
        - 5173  # Vite 前端开发服务器

# ========================================
# 自动同步到 GitHub
# ========================================
# 每次新增 tag 时，自动将代码推送到 GitHub 镜像仓库。
# GITHUB_TOKEN 从 CNB 密钥仓库获取：
#   https://cnb.cool/xindu.site/secret/-/blob/main/token.yaml
# ========================================
tag:
  - stages:
      - name: sync-to-github
        image: alpine/git:latest
        env:
          GITHUB_TOKEN:
            from_secret:
              source: xindu.site/secret
              file: token.yaml
              key: GITHUB_TOKEN
        script:
          - git config --global user.email "cnb@sync.bot"
          - git config --global user.name "CNB Sync Bot"
          - |
            if git remote get-url github &>/dev/null; then
              git remote set-url github https://x-access-token:${GITHUB_TOKEN}@github.com/carolcoral/mock-server.git
            else
              git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/carolcoral/mock-server.git
            fi
          - git push github --mirror