# 腾讯云 CNB 云原生构建配置
# Cloud Native Build 配置文件
# 项目: Mock Server - API接口模拟服务器
# 作者: carolcoral

# API版本
version: '1.0'

# 应用名称
name: mock-server

# 构建配置
build:
  # 构建环境
  environment:
    # 基础镜像
    image: maven:3.9-eclipse-temurin-17
    
    # 环境变量
    env:
      - name: MAVEN_OPTS
        value: -Dmaven.repo.local=/cache/maven
      - name: NODE_VERSION
        value: "18"
      - name: NPM_REGISTRY
        value: https://registry.npmmirror.com
      - name: MAVEN_MIRROR
        value: https://maven.aliyun.com/repository/public

  # 构建步骤
  steps:
    # Step 1: 准备阶段 - 验证和安装依赖
    - name: prepare-build-env
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  准备构建环境"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        # 验证必需工具
        echo "验证必需工具..."
        if ! command -v java &> /dev/null; then
          echo "✗ Java 未安装"
          exit 1
        fi
        
        if ! command -v mvn &> /dev/null; then
          echo "✗ Maven 未安装"
          exit 1
        fi
        
        # 安装 Node.js 18（如果未安装）
        if ! command -v node &> /dev/null; then
          echo "Node.js 未安装，正在安装..."
          curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          apt-get install -y nodejs
        fi
        
        # 验证安装
        echo ""
        echo "环境信息:"
        echo "  Node.js: $(node --version)"
        echo "  npm: $(npm --version)"
        echo "  Java: $(java -version 2>&1 | head -n 1)"
        echo "  Maven: $(mvn --version | head -n 1)"
        
        echo ""
        echo "✓ 构建环境准备完成"
      
      # 缓存配置
      cache:
        paths:
          - /cache/maven
          - /cache/node_modules
          - /root/.m2

    # Step 2: 构建后端
    - name: build-backend
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  构建后端 (Spring Boot)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        
        cd backend
        
        # 配置 Maven
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <settings>
          <mirrors>
            <mirror>
              <id>aliyun</id>
              <mirrorOf>central</mirrorOf>
              <name>Aliyun Maven</name>
              <url>https://maven.aliyun.com/repository/public</url>
            </mirror>
          </mirrors>
        </settings>
        EOF
        
        # 编译和打包项目（合并命令提升性能）
        echo "正在编译和打包后端应用..."
        mvn clean package -DskipTests -q
        
        # 验证构建结果（使用通配符匹配任意版本）
        if ls target/mock-server-*.jar 1> /dev/null 2>&1; then
          echo ""
          echo "✓ 后端构建成功"
          echo "  JAR文件: $(ls -lh target/mock-server-*.jar | awk '{print $9, $5}')"
          ls -lh target/mock-server-*.jar
        else
          echo "✗ 后端构建失败，未找到 JAR 文件"
          exit 1
        fi
        
        cd ..
      
      # 产出物
      artifacts:
        paths:
          - backend/target/mock-server-*.jar
        
      # 缓存配置
      cache:
        paths:
          - ~/.m2
          - /cache/maven

    # Step 3: 构建前端
    - name: build-frontend
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  构建前端 (Vue 3 + Vite)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        
        cd frontend
        
        # 配置 npm 镜像
        npm config set registry https://registry.npmmirror.com
        
        # 安装依赖（基于 package-lock.json 判断是否需要重新安装）
        echo "正在安装前端依赖..."
        if [ ! -d "node_modules" ] || [ "package-lock.json" -nt "node_modules/.last-install" ]; then
          npm ci --prefer-offline --no-audit --no-fund
          touch node_modules/.last-install
        else
          echo "node_modules 已存在且为最新，跳过安装"
        fi
        
        # 构建生产版本
        echo "正在构建前端生产版本..."
        npm run build
        
        # 验证构建结果
        if [ -d "dist" ] && [ -f "dist/index.html" ]; then
          echo ""
          echo "✓ 前端构建成功"
          echo "  输出目录: frontend/dist/"
          echo "  文件数量: $(find dist -type f | wc -l)"
          echo "  目录大小: $(du -sh dist | awk '{print $1}')"
        else
          echo "✗ 前端构建失败"
          exit 1
        fi
        
        cd ..
      
      # 产出物
      artifacts:
        paths:
          - frontend/dist/**/**
        
      # 缓存配置
      cache:
        paths:
          - frontend/node_modules
          - ~/.npm

    # Step 4: 构建 Docker 镜像
    - name: build-docker-image
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  构建 Docker 镜像"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        
        # 确保 Dockerfile 存在（如果不存在则创建，存在则复用）
        if [ ! -f "docker/Dockerfile" ]; then
          echo "未找到现有 Dockerfile，创建默认配置..."
          mkdir -p docker
          cat > docker/Dockerfile << 'EOF'
        # 腾讯云优化镜像
        FROM ccr.ccs.tencentyun.com/tencentio/openjdk:17-jre-slim
        
        # 作者信息
        LABEL maintainer="carolcoral"
        LABEL description="Mock Server - API接口模拟服务器"
        
        # 设置工作目录
        WORKDIR /app
        
        # 安装必要的工具（用于健康检查）
        RUN apt-get update && apt-get install -y \
            curl \
            && rm -rf /var/lib/apt/lists/*
        
        # 创建数据目录和日志目录
        RUN mkdir -p /app/data /app/logs
        
        # 复制后端jar包（使用通配符，确保找到正确的文件）
        COPY backend/target/mock-server-*.jar /app/mock-server.jar
        
        # 复制前端静态文件
        COPY frontend/dist /app/public
        
        # 暴露端口
        EXPOSE 8080
        
        # 健康检查（使用根路径，更通用，适用于HTTP和WebSocket服务）
        HEALTHCHECK --interval=30s --timeout=10s --start-period=60s --retries=3 \
            CMD curl -f http://localhost:8080/ || exit 1
        
        # 启动命令（使用数组格式，避免shell包装）
        ENTRYPOINT ["java", "-jar", "/app/mock-server.jar"]
        EOF
          echo "✓ 已创建默认 Dockerfile"
        else
          echo "✓ 使用现有 Dockerfile"
          echo "  文件路径: docker/Dockerfile"
        fi
        
        # 验证必需文件存在
        if [ ! -f "backend/target/mock-server-1.0.0.jar" ]; then
          echo "✗ 错误: 未找到后端JAR文件，请先构建后端"
          echo "  期望路径: backend/target/mock-server-1.0.0.jar"
          exit 1
        fi
        
        if [ ! -d "frontend/dist" ]; then
          echo "✗ 错误: 未找到前端构建产物，请先构建前端"
          echo "  期望路径: frontend/dist/"
          exit 1
        fi
        
        # 构建镜像
        echo "正在构建 Docker 镜像..."
        docker build -t mock-server:${BUILD_ID:-latest} -f docker/Dockerfile .
        
        # 验证镜像
        if docker image inspect mock-server:${BUILD_ID:-latest} > /dev/null 2>&1; then
          echo ""
          echo "✓ Docker 镜像构建成功"
          echo "  镜像标签: mock-server:${BUILD_ID:-latest}"
          echo "  镜像大小: $(docker images mock-server:${BUILD_ID:-latest} --format '{{.Size}}')"
        else
          echo "✗ Docker 镜像构建失败"
          exit 1
        fi
      
      # 产出物
      artifacts:
        paths:
          - docker/Dockerfile
      
      # 缓存配置
      cache:
        paths:
          - docker/*

    # Step 5: 镜像推送到腾讯云镜像仓库
    - name: push-image
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  推送镜像到腾讯云仓库"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        
        # 获取镜像仓库信息（从环境变量）
        TCR_NAMESPACE=${TCR_NAMESPACE:-}
        TCR_REGION=${TCR_REGION:-"ap-guangzhou"}
        IMAGE_TAG=${BUILD_ID:-latest}
        
        # 验证必需的环境变量
        if [ -z "${TCR_USERNAME:-}" ] || [ -z "${TCR_PASSWORD:-}" ]; then
          echo "✗ 错误: TCR_USERNAME 和 TCR_PASSWORD 环境变量未设置"
          echo "  请在部署时配置镜像仓库凭据"
          exit 1
        fi
        
        if [ -z "${TCR_NAMESPACE:-}" ]; then
          echo "✗ 错误: TCR_NAMESPACE 环境变量未设置"
          echo "  请设置腾讯云镜像仓库命名空间"
          exit 1
        fi
        
        # 验证必需的环境变量
        if [ -z "${TCR_USERNAME:-}" ] || [ -z "${TCR_PASSWORD:-}" ]; then
          echo "✗ 错误: TCR_USERNAME 和 TCR_PASSWORD 环境变量未设置"
          echo "  请在部署时配置镜像仓库凭据"
          exit 1
        fi
        
        # 打标签
        echo "正在打标签..."
        docker tag mock-server:${IMAGE_TAG} ccr.ccs.tencentyun.com/${TCR_NAMESPACE}/mock-server:${IMAGE_TAG}
        
        # 登录腾讯云镜像仓库（使用--password-stdin避免密码暴露）
        echo "正在登录腾讯云镜像仓库..."
        # 使用双引号防止密码中的特殊字符导致问题
        printf "%s" "$TCR_PASSWORD" | docker login --username="$TCR_USERNAME" --password-stdin ccr.ccs.tencentyun.com
        
        if [ $? -ne 0 ]; then
          echo "✗ 登录失败，请检查用户名和密码"
          exit 1
        fi
        
        # 推送镜像
        echo "正在推送镜像..."
        docker push ccr.ccs.tencentyun.com/${TCR_NAMESPACE}/mock-server:${IMAGE_TAG}
        
        if [ $? -eq 0 ]; then
          echo ""
          echo "✓ 镜像推送成功"
          echo "  镜像地址: ccr.ccs.tencentyun.com/${TCR_NAMESPACE}/mock-server:${IMAGE_TAG}"
        else
          echo "✗ 镜像推送失败"
          exit 1
        fi
      
      # 需要的环境变量
      env:
        - name: TCR_USERNAME
          value: ${TCR_USERNAME}
          required: true
          description: "腾讯云镜像仓库用户名"
        - name: TCR_PASSWORD
          value: ${TCR_PASSWORD}
          secret: true
          required: true
          description: "腾讯云镜像仓库密码"
        - name: TCR_NAMESPACE
          value: ${TCR_NAMESPACE:-"default"}
          description: "腾讯云镜像仓库命名空间"

    # Step 6: 生成部署清单
    - name: generate-deployment-manifest
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  生成 Kubernetes 部署清单"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        
        # 创建部署清单
        cat > deployment.yaml << EOF
        # Secret 资源（存储敏感信息）
        apiVersion: v1
        kind: Secret
        metadata:
          name: mock-server-secret
          labels:
            app: mock-server
        type: Opaque
        stringData:
          jwt-secret: ${JWT_SECRET:-your-super-secret-jwt-key-at-least-256-bits-long-change-this-in-production}
          admin-password: ${ADMIN_PASSWORD:-YourStrongP@ssw0rd123}
          mysql-password: ${MYSQL_PASSWORD:-}
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: mock-server
          labels:
            app: mock-server
            version: ${BUILD_ID:-latest}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: mock-server
          template:
            metadata:
              labels:
                app: mock-server
                version: ${BUILD_ID:-latest}
            spec:
              containers:
              - name: mock-server
                image: ccr.ccs.tencentyun.com/${TCR_NAMESPACE:-default}/mock-server:${BUILD_ID:-latest}
                ports:
                - containerPort: 8080
                  name: http
                env:
                - name: SPRING_PROFILES_ACTIVE
                  value: "cloud"
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: mock-server-secret
                      key: jwt-secret
                - name: ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mock-server-secret
                      key: admin-password
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1024Mi
                livenessProbe:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                readinessProbe:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                volumeMounts:
                - name: data
                  mountPath: /app/data
                - name: logs
                  mountPath: /app/logs
              volumes:
              - name: data
                emptyDir: {}
              - name: logs
                emptyDir: {}
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: mock-server-service
          labels:
            app: mock-server
        spec:
          selector:
            app: mock-server
          ports:
          - protocol: TCP
            port: 8080
            targetPort: 8080
            name: http
          type: ClusterIP
        ---
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: mock-server-ingress
          annotations:
            kubernetes.io/ingress.class: nginx
            nginx.ingress.kubernetes.io/rewrite-target: /
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
        spec:
          rules:
          - host: ${INGRESS_HOST}
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: mock-server-service
                    port:
                      number: 8080
        EOF
        
        echo "✓ 部署清单已生成: deployment.yaml"
        cat deployment.yaml

# 部署配置
deploy:
  # 部署策略
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  # 部署环境
  environments:
    - name: dev
      enabled: true
      namespace: ${NAMESPACE:-mock-server-dev}
      replicas: 1
      resources:
        cpu: 500m
        memory: 512Mi
      autoDeploy:
        enabled: true
        branches:
          - develop
          - feature/*
      
    - name: test
      enabled: true
      namespace: ${NAMESPACE:-mock-server-test}
      replicas: 2
      resources:
        cpu: 1000m
        memory: 1024Mi
      autoDeploy:
        enabled: true
        branches:
          - release/*
      
    - name: prod
      enabled: true
      namespace: ${NAMESPACE:-mock-server-prod}
      replicas: ${REPLICAS:-3}
      resources:
        cpu: ${CPU_LIMIT:-2000m}
        memory: ${MEMORY_LIMIT:-2048Mi}
      autoDeploy:
        enabled: false
        requireApproval: true
        branches:
          - main
          - master
      
      # 自动扩缩容
      autoscaling:
        enabled: ${AUTOSCALING_ENABLED:-true}
        minReplicas: ${MIN_REPLICAS:-3}
        maxReplicas: ${MAX_REPLICAS:-10}
        metrics:
          - type: cpu
            target:
              type: Utilization
              averageUtilization: ${CPU_THRESHOLD:-70}
          - type: memory
            target:
              type: Utilization
              averageUtilization: ${MEMORY_THRESHOLD:-80}
  
  # 健康检查
  healthCheck:
    enabled: true
    liveness:
      path: ${HEALTH_CHECK_PATH:-/}
      port: 8080
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      path: ${HEALTH_CHECK_PATH:-/}
      port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# 服务配置
service:
  name: mock-server
  type: web
  port: 8080
  targetPort: 8080
  
  # 路由配置
  routes:
    - path: /api
      rewrite: false
    - path: /ws
      websocket: true
    - path: /v3/api-docs
      rewrite: false
    - path: /swagger-ui.html
      rewrite: false

# 环境变量配置
env:
  # JWT配置
  - name: JWT_SECRET
    value: ${JWT_SECRET:-your-super-secret-jwt-key-at-least-256-bits-long-change-this-in-production}
    required: true
    secret: true
    description: "JWT加密密钥（生产环境必须自定义，至少256位）"

  - name: JWT_EXPIRATION
    value: ${JWT_EXPIRATION:-1800000}
    description: "JWT过期时间（毫秒，默认30分钟）"

  # 管理员配置
  - name: ADMIN_USERNAME
    value: ${ADMIN_USERNAME:-admin}
    description: "管理员用户名（默认: admin）"

  - name: ADMIN_PASSWORD
    value: ${ADMIN_PASSWORD:-YourStrongP@ssw0rd123}
    required: true
    secret: true
    description: "管理员密码（生产环境必须自定义，至少8位，包含大小写字母、数字和特殊字符）"

  - name: SWAGGER_USERNAME
    value: ${SWAGGER_USERNAME:-swagger_admin}
    secret: true
    description: "Swagger登录用户名（可选）"

  - name: SWAGGER_PASSWORD
    value: ${SWAGGER_PASSWORD:-YourSw@ggerP@ss123}
    secret: true
    description: "Swagger登录密码（可选）"

  - name: ALLOWED_ORIGINS
    value: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    description: "CORS允许的源列表（生产环境必须配置）"
  
  # 应用配置
  - name: SPRING_PROFILES_ACTIVE
    value: ${SPRING_PROFILES_ACTIVE:-cloud}
    description: "Spring环境配置（默认: cloud）"
  
  # JVM配置
  - name: JAVA_OPTS
    value: ${JAVA_OPTS:--Xmx512m -Xms256m -XX:+UseG1GC}
    description: "JVM参数（可根据内存限制调整）"
  
  # 数据库配置（可选）
  - name: SPRING_DATASOURCE_URL
    value: ${SPRING_DATASOURCE_URL:-jdbc:sqlite:/app/data/mock_server.db}
    description: "数据库连接URL（默认使用SQLite）"
  
  - name: MYSQL_USERNAME
    value: ${MYSQL_USERNAME:-}
    description: "数据库用户名（使用MySQL时配置）"
  
  - name: MYSQL_PASSWORD
    value: ${MYSQL_PASSWORD:-}
    secret: true
    description: "数据库密码（使用MySQL时配置）"
  
  # 镜像仓库配置
  - name: TCR_NAMESPACE
    value: ${TCR_NAMESPACE:-default}
    description: "腾讯云镜像仓库命名空间（默认: default）"
  
  - name: TCR_REGION
    value: ${TCR_REGION:-ap-guangzhou}
    description: "腾讯云镜像仓库区域（默认: ap-guangzhou）"
  
  # 健康检查配置
  - name: HEALTH_CHECK_PATH
    value: ${HEALTH_CHECK_PATH:-/api/v3/api-docs}
    description: "健康检查路径（默认: /api/v3/api-docs）"
  
  # 其他配置
  - name: TZ
    value: ${TZ:-Asia/Shanghai}
    description: "时区（默认: Asia/Shanghai）"
  
  - name: LOG_LEVEL
    value: ${LOG_LEVEL:-INFO}
    description: "日志级别（默认: INFO）"
  
  # 命名空间配置
  - name: NAMESPACE
    value: ${NAMESPACE:-mock-server}
    description: "Kubernetes命名空间前缀"

# 数据库配置（可选）
database:
  # 使用腾讯云MySQL（推荐生产环境）
  - type: mysql
    name: mock-server-db
    # 配置来源：环境变量
    config:
      host: ${MYSQL_HOST}
      port: ${MYSQL_PORT:-3306}
      database: ${MYSQL_DATABASE:-mock_server}
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      parameters:
        useSSL: false
        serverTimezone: Asia/Shanghai
        characterEncoding: utf8mb4

# 缓存配置
cache:
  # Caffeine缓存配置
  - type: caffeine
    enabled: true
    config:
      spec: maximumSize=10000,expireAfterWrite=10m
  
  # Redis配置（如果使用腾讯云Redis）
  # - type: redis
  #   enabled: false
  #   config:
  #     host: ${REDIS_HOST}
  #     port: ${REDIS_PORT:-6379}
  #     password: ${REDIS_PASSWORD}
  #     database: 0

# 存储配置
storage:
  # 日志存储
  - name: logs
    type: cloud
    mountPath: /app/logs
  
  # 数据存储
  - name: data
    type: cloud
    mountPath: /app/data

# CI/CD配置
ci:
  # 构建触发器
  triggers:
    # 代码提交触发
    - type: push
      branches:
        - main
        - master
        - develop
      
    # 标签触发
    - type: tag
      pattern: v*
      
    # 定时构建（每天凌晨3点）
    - type: schedule
      cron: "0 3 * * *"
  
  # 流水线
  pipelines:
    # 主分支流水线
    - name: main-pipeline
      triggers:
        - push:main
        - push:master
      stages:
        - build
        - test
        - deploy:prod
    
    # 开发分支流水线
    - name: dev-pipeline
      triggers:
        - push:develop
      stages:
        - build
        - test
        - deploy:dev
    
    # 标签发布流水线
    - name: release-pipeline
      triggers:
        - tag
      stages:
        - build
        - test
        - deploy:prod

# 通知配置
notifications:
  # 构建成功通知
  - type: build_success
    channels:
      - type: email
        recipients:
          - ${NOTIFICATION_EMAIL}
      - type: webhook
        url: ${WEBHOOK_URL}
  
  # 构建失败通知
  - type: build_failure
    channels:
      - type: email
        recipients:
          - ${NOTIFICATION_EMAIL}
      - type: webhook
        url: ${WEBHOOK_URL}
  
  # 部署成功通知
  - type: deploy_success
    channels:
      - type: email
        recipients:
          - ${NOTIFICATION_EMAIL}
      - type: webhook
        url: ${WEBHOOK_URL}

# 监控配置
monitoring:
  # 应用性能监控
  apm:
    enabled: true
    sampling:
      rate: 1.0  # 采样率
  
  # 日志收集
  logging:
    enabled: true
    level: INFO
    format: json  # JSON格式便于分析
  
  # 指标收集
  metrics:
    enabled: true
    port: 8080
    path: /actuator/prometheus
  
  # 告警规则
  alerting:
    enabled: true
    rules:
      - name: high_cpu_usage
        expr: cpu_usage > 80
        for: 5m
        severity: warning
      
      - name: high_memory_usage
        expr: memory_usage > 85
        for: 5m
        severity: warning
      
      - name: high_error_rate
        expr: error_rate > 5
        for: 3m
        severity: critical
      
      - name: pod_crash_looping
        expr: pod_restart_count > 5
        for: 10m
        severity: critical

# 安全加固
security:
  # 镜像安全扫描
  imageScan:
    enabled: true
    severity:
      - HIGH
      - CRITICAL
    
    # 漏洞阈值
    maxVulnerabilities: 0
  
  # 依赖扫描
  dependencyScan:
    enabled: true
    
  # 密钥扫描
  secretScan:
    enabled: true
    
  # 网络策略
  networkPolicy:
    enabled: false  # 生产环境建议开启
    policies:
      - name: allow-ingress
        type: ingress
        from:
          - namespaceSelector:
              matchLabels:
                name: ingress-nginx
          - podSelector:
              matchLabels:
                app: mock-server
      
      - name: allow-egress
        type: egress
        to: []
        ports:
          - protocol: TCP
            port: 53  # DNS
          - protocol: UDP
            port: 53  # DNS

# 成本优化
cost:
  # 预留实例
  reservedInstances:
    enabled: false
    term: 1year
    paymentOption: all_upfront
  
  # 自动启停（开发环境）
  autoStop:
    enabled: false
    schedule: "0 22 * * *"  # 每天22:00停止
    startSchedule: "0 8 * * *"  # 每天8:00启动
  
  # 资源优化建议
  optimization:
    enabled: true
    recommendations:
      - type: rightsizing
        enabled: true

# 自定义域名
domain:
  # 是否启用自定义域名
  custom:
    enabled: false
    domain: ${CUSTOM_DOMAIN}
    
    # SSL证书
    ssl:
      enabled: true
      autoRenew: true
      
      # 证书来源
      source: tencent-cloud  # 或 user-provided
  
  # 默认域名
  default:
    enabled: true
    suffix: tcloudbaseapp.com

# 版本信息
metadata:
  version: "1.0.0"
  description: "Mock Server - API接口模拟服务器"
  author: "carolcoral"
  repository: "https://github.com/carolcoral/mock-server"
  documentation: "https://github.com/carolcoral/mock-server/blob/main/README.md"
  
  # 标签
  labels:
    - name: app
      value: mock-server
    - name: component
      value: api
    - name: environment
      value: cloud
    - name: managed-by
      value: tencent-cloud-cnb
    - name: creator
      value: carolcoral

# 文档链接
docs:
  - name: 快速开始
    url: https://github.com/carolcoral/mock-server/blob/main/TENCENT_CLOUD_QUICKSTART.md
  - name: 详细部署文档
    url: https://github.com/carolcoral/mock-server/blob/main/DEPLOY_TENCENT_CLOUD.md
  - name: 项目说明
    url: https://github.com/carolcoral/mock-server/blob/main/README.md
  - name: API文档
    url: https://your-app-id.tcloudbaseapp.com/api/swagger-ui.html
