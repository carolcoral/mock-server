services:
  mock-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mock-server
    restart: unless-stopped
    ports:
      # 映射容器内的 8080 端口到宿主机的 8080 端口
      # 通过此端口可以同时访问后端 API 和前端页面
      - "${HOST_PORT:-8080}:8080"
    environment:
      # 后端配置
      - SPRING_PROFILES_ACTIVE=docker
      - TZ=Asia/Shanghai
      - SERVER_PORT=8080
      
      # 数据库配置
      - DB_URL=jdbc:sqlite:/app/data/mock-server.db
      
      # 日志配置
      - LOG_FILE_PATH=/app/logs/mock-server.log
      
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-scbcnlsue#TVYbxka73bdlyabjj63glbod4vjb^FRIGBbja63jku^FXYZ123456789ABC}
      - JWT_EXPIRATION=86400000
      
      # 管理员账号配置
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123!}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mockserver.com}
      
      # CORS 配置
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000,http://localhost:3002
      
      # 前端配置（通过环境变量传递给应用）
      - FRONTEND_PORT=8080
      
      # JVM 配置
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mock-network
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  mock-network:
    driver: bridge
