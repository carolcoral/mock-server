services:
  mock-server:
    image: docker.cnb.cool/xindu.site/mock-server:latest
    container_name: mock-server
    restart: unless-stopped
    # 以 root 用户启动入口脚本，由启动脚本内部切换到 appuser 运行 Java
    # 这样确保 volume 挂载的 data/logs 目录可以被正确初始化权限
    user: "0:0"
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8080
      - DB_URL=jdbc:sqlite:/app/data/mock-server.db
      - LOG_FILE_PATH=/app/logs/mock-server.log
      - JWT_SECRET=${JWT_SECRET:-scbcnlsue#TVYbxka73bdlyabjj63glbod4vjb^FRIGBbja63jku^FXYZ123456789ABC}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123!}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mockserver.com}
      - SWAGGER_USERNAME=${SWAGGER_USERNAME:-swagger_admin}
      - SWAGGER_PASSWORD=${SWAGGER_PASSWORD:-Swagger@Admin!}
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - ./data:/app/data:rw
      - ./logs:/app/logs:rw
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - mock-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

networks:
  mock-network:
    driver: bridge
