version: '3.8'

services:
  mock-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mock-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mock-network

networks:
  mock-network:
    driver: bridge
