# ========================================
# 手动触发流水线按钮配置
# ========================================
# 在仓库分支详情页展示自定义按钮，点击即可手动触发对应流水线。
# 按钮仅触发 .cnb.yml 中定义的 web_trigger 自定义事件。
# ========================================
branch:
  - buttons:
      - name: 同步到 GitHub
        event: web_trigger_sync_to_github
        description: 手动推送当前分支代码到 GitHub 镜像仓库
